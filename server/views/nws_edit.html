<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nieuwsartikel bewerken</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark custom-navbar">
      <div class="container">
        <span class="navbar-brand mb-0 h1">Nieuwsbeheer</span>
      </div>
    </nav>

    <main class="container py-5">
      <div class="mb-4">
        <a href="/" class="btn btn-outline-secondary"
          >&larr; Terug naar overzicht</a
        >
      </div>

      <div class="card custom-card">
        <div class="card-body p-4">
          <h1 class="page-title mb-4">Nieuwsartikel bewerken</h1>

          <form action="#" method="POST">
            <div class="mb-3">
              <label for="title" class="form-label">Titel</label>
              <input
                type="text"
                id="title"
                name="title"
                class="form-control"
                value="Nieuwe fietsbrug geopend in Gent"
                required
              />
            </div>

            <div class="mb-3">
              <label for="author" class="form-label">Auteur</label>
              <input
                type="text"
                id="author"
                name="author"
                class="form-control"
                value="Emma Janssens"
                required
              />
            </div>

            <div class="mb-3">
              <label for="category" class="form-label">Categorie</label>
              <select
                id="category"
                name="category"
                class="form-select"
                required
              >
                <option selected>Stad</option>
                <option>Politiek</option>
                <option>Evenement</option>
                <option>Onderwijs</option>
                <option>Cultuur</option>
                <option>Mobiliteit</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="date" class="form-label">Publicatiedatum</label>
              <input
                type="date"
                id="date"
                name="date"
                class="form-control"
                value="2026-04-18"
                required
              />
            </div>

            <div class="mb-3">
              <label for="status" class="form-label">Status</label>
              <select id="status" name="status" class="form-select" required>
                <option selected>Gepubliceerd</option>
                <option>Concept</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="summary" class="form-label">Korte samenvatting</label>
              <textarea
                id="summary"
                name="summary"
                class="form-control"
                rows="3"
              >
De nieuwe fietsbrug moet de verbinding tussen twee wijken veiliger en sneller maken.</textarea
              >
            </div>

            <div class="mb-4">
              <label for="content" class="form-label">Inhoud</label>
              <textarea
                id="content"
                name="content"
                class="form-control"
                rows="8"
                required
              >
Vandaag is in Gent een nieuwe fietsbrug officieel geopend. De brug moet zorgen voor een vlottere en veiligere doorgang voor fietsers en voetgangers.</textarea
              >
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success">Opslaan</button>
              <a href="/" class="btn btn-secondary">Annuleren</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
